<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandbook | Caracas Bakery</title>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --accent: #EDE2D5; /* Color arena/crema */
            --text-main: #000000;
            --text-secondary: #666666;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Cintillo centrado */
        .cintillo-seccion {
            width: 100%;
            background-color: var(--accent);
            padding: 80px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .cintillo-seccion h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Contenedor para el botón debajo del cintillo */
        .nav-container {
            max-width: 1100px;
            margin: 10px auto 0 auto; /* Reducido de 20px a 10px */
            padding: 0 20px;
            display: flex;
            justify-content: flex-start;
        }

        .btn-volver {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: none; /* Primera letra en mayúscula manual */
            transition: color 0.3s ease;
        }

        .btn-volver:hover {
            color: var(--text-main);
        }

        /* Área de contenido */
        .contenido-recursos {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .cintillo-seccion { padding: 60px 0; }
            .cintillo-seccion h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header class="cintillo-seccion">
        <h1>Brandbook</h1> 
    </header>

    <!-- El botón ahora vive aquí, justo debajo del cintillo -->
    <nav class="nav-container">
        <a href="index.html" class="btn-volver">← Volver al inicio</a>
    </nav>

    <main class="contenido-recursos">
        <p>Aquí irán los visualizadores y enlaces de descarga del Brandbook.</p>
    </main>

</body>
</html>
