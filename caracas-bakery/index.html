<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assets | Caracas Bakery</title>
   <style>
    :root {
        --bg-color: #FFFFFF;
        --accent: #f4f4f4;
    }

    body {
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        /* Definimos un alto mínimo y padding para asegurar el espacio */
        width: 100%;
        padding-top: 60px;
        padding-bottom: 40px; 
        text-align: center;
    }

    .logo-bakery {
        max-height: 90px;
        height: auto;
    }

    main {
        /* Esta es la clave: el margin-top separa el bloque del grid del header */
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 50px; /* <--- AJUSTA ESTE NÚMERO PARA MÁS O MENOS ESPACIO */
        padding-bottom: 80px;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        gap: 20px;
        width: 90%;
        max-width: 1100px;
    }

    .bento-item {
        background-color: var(--accent);
        border-radius: 24px;
        padding: 30px;
        text-decoration: none;
        color: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .item-large { grid-column: span 2; grid-row: span 2; }
    .item-wide { grid-column: span 2; }

    @media (max-width: 768px) {
        header { padding-top: 40px; padding-bottom: 20px; }
        main { margin-top: 30px; }
        .bento-grid { grid-template-columns: 1fr; width: 85%; }
        .item-large, .item-wide { grid-column: span 1; grid-row: span 1; }
    }
</style>
</head>
<body>

    <header>
        <!-- Aquí puedes colocar un GIF animado o el SVG de Caracas Bakery -->
        <img src="recursos/logo-caracas-bakery.png" alt="Caracas Bakery" class="logo-bakery">

    <main class="bento-grid">
        
        <!-- Cuadro Grande: Logos -->
        <a href="recursos/logos.zip" download class="bento-item item-large">
            <h3>LOGOTIPOS</h3>
            <p>Descargar variantes (PNG, SVG, JPG)</p>
        </a>

        <!-- Cuadro: Menú -->
        <a href="recursos/menu.pdf" download class="bento-item">
            <h3>MENÚ</h3>
            <p>Cartas y Digital</p>
        </a>

        <!-- Cuadro: Stickers -->
        <a href="recursos/stickers.zip" download class="bento-item">
            <h3>STICKERS</h3>
            <p>Diseños para empaque</p>
        </a>

        <!-- Cuadro Horizontal: Patrones -->
        <a href="recursos/patrones.zip" download class="bento-item item-wide">
            <h3>PATRONES</h3>
            <p>Texturas de marca e identidad visual</p>
        </a>

    </main>

</body>
</html>
