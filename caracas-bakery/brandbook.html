    <title>Brandbook | Caracas Bakery</title>
   <style>
    .cintillo-seccion {
        width: 100%;
        background-color: var(--accent);
        padding: 80px 0; /* Aumentamos el padding para un look más premium */
        text-align: center;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        position: relative; /* Necesario para ubicar el botón adentro */
    }

    .btn-volver {
        position: absolute; /* Lo sacamos del flujo normal */
        top: 20px;          /* Distancia desde arriba */
        left: 30px;         /* Distancia desde la izquierda */
        text-decoration: none;
        color: #666;
        font-size: 0.8rem;
        text-transform: none;
        transition: color 0.3s ease;
    }

    .btn-volver:hover {
        color: #000;
    }

    .cintillo-seccion h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        /* El título se queda centrado automáticamente */
    }
</style>

<body>
    <header class="cintillo-seccion">
        <a href="index.html" class="btn-volver">← Volver al inicio</a>
        <h1>Brandbook</h1> 
    </header>

</body>
