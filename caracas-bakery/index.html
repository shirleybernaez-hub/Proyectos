<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assets | Caracas Bakery</title>
   <style>
    :root {
        --bg-color: #FFFFFF;
        --accent: #f4f4f4;
    }

    body {
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
    }

    header {
        width: 100%;
        padding: 80px 0 60px 0;
        text-align: center;
    }

    .logo-bakery {
        /* Logo aumentado según tu solicitud */
        max-height: 120px; 
        width: auto;
        transition: transform 0.3s ease;
    }

    .grid-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 20px 80px 20px;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        /* Reducimos un poco la altura base para que quepan más filas cómodamente */
        grid-auto-rows: 220px; 
        gap: 20px;
    }

    .bento-item {
        background-color: var(--accent);
        border-radius: 24px;
        padding: 30px;
        text-decoration: none;
        color: #000;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-end;
        text-align: right;
        box-sizing: border-box;
        transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .bento-item:hover {
        transform: scale(1.02);
        background-color: #f0f0f0;
    }

    .bento-item h3 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .bento-item p {
        margin: 5px 0 0 0;
        font-size: 0.85rem;
        opacity: 0.6;
    }

    /* Jerarquía de tamaños para acomodar las nuevas cards */
    .item-large { grid-column: span 2; grid-row: span 2; }
    .item-wide { grid-column: span 2; }

    @media (max-width: 768px) {
        header { padding: 60px 0 40px 0; }
        .logo-bakery { max-height: 90px; }
        .bento-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
        .item-large, .item-wide { grid-column: span 1; grid-row: span 1; }
        .bento-item { min-height: 180px; }
    }
</style>

</head>
<body>

    <header>
    <img src="recursos/logo-caracas-bakery.png" class="logo-bakery">
</header>

<div class="grid-container">
    <main class="bento-grid">
        
        <!-- 1. BRANDBOOK -->
        <a href="recursos/brandbook.pdf" download class="bento-item item-large">
            <h3>BRANDBOOK</h3>
            <p>Manual de identidad completo</p>
        </a>

        <!-- 2. LOGOTIPOS (Texto simplificado) -->
        <a href="recursos/logos.zip" download class="bento-item">
            <h3>LOGOTIPOS</h3>
            <p>Variantes (PNG, SVG, JPG)</p>
        </a>

        <!-- 3. MENÚ (Subtítulo actualizado) -->
        <a href="recursos/menu.pdf" download class="bento-item">
            <h3>MENÚ</h3>
            <p>Menú digital, CB y pizzas</p>
        </a>

        <!-- 4. FLYERS (Nueva) -->
        <a href="recursos/flyers.zip" download class="bento-item">
            <h3>FLYERS</h3>
            <p>Promociones y eventos</p>
        </a>

        <!-- 5. MERCH (Nueva) -->
        <a href="recursos/merch.zip" download class="bento-item">
            <h3>MERCH</h3>
            <p>Franelas y delantales</p>
        </a>

        <!-- 6. STICKERS -->
        <a href="recursos/stickers.zip" download class="bento-item">
            <h3>STICKERS</h3>
            <p>Diseños para empaque</p>
        </a>

        <!-- 7. PATRONES -->
        <a href="recursos/patrones.zip" download class="bento-item item-wide">
            <h3>PATRONES</h3>
            <p>Texturas de marca e identidad visual</p>
        </a>

        <!-- 8. ROTULACIONES -->
        <a href="recursos/patrones.zip" download class="bento-item item-wide">
            <h3>ROTULACIONES</h3>
            <p>Piezas gráficas para decoración</p>
        </a>
    </main>
</div>

</body>
</html>
