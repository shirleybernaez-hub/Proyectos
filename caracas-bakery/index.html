<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assets | Caracas Bakery</title>
    <style>
    :root {
        --bg-color: #FFFFFF;
        --text-color: #000000;
        --accent: #f4f4f4;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        /* Se aumentó el tercer valor a 60px para dar más espacio abajo */
        padding: 40px 20px 60px 20px; 
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }

    .logo-bakery {
        max-height: 80px;
        height: auto;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        gap: 15px;
        width: 90%;
        max-width: 1100px;
        padding-bottom: 60px;
    }

    .bento-item {
        background-color: var(--accent);
        border-radius: 20px;
        padding: 30px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        transition: transform 0.3s ease;
    }

    /* Estilos Desktop */
    .item-large { grid-column: span 2; grid-row: span 2; }
    .item-wide { grid-column: span 2; }

    /* Estilos Mobile */
    @media (max-width: 768px) {
        header { padding: 30px 15px 40px 15px; } /* Espacio ajustado para móvil */
        .bento-grid {
            grid-template-columns: 1fr;
            grid-auto-rows: auto;
        }
        .item-large, .item-wide { grid-column: span 1; grid-row: span 1; }
        .bento-item { min-height: 180px; }
    }
</style>
</head>
<body>

    <header>
        <!-- Aquí puedes colocar un GIF animado o el SVG de Caracas Bakery -->
        <img src="recursos/logo-caracas-bakery.png" alt="Caracas Bakery" class="logo-bakery">

    <main class="bento-grid">
        
        <!-- Cuadro Grande: Logos -->
        <a href="recursos/logos.zip" download class="bento-item item-large">
            <h3>LOGOTIPOS</h3>
            <p>Descargar variantes (PNG, SVG, JPG)</p>
        </a>

        <!-- Cuadro: Menú -->
        <a href="recursos/menu.pdf" download class="bento-item">
            <h3>MENÚ</h3>
            <p>Cartas y Digital</p>
        </a>

        <!-- Cuadro: Stickers -->
        <a href="recursos/stickers.zip" download class="bento-item">
            <h3>STICKERS</h3>
            <p>Diseños para empaque</p>
        </a>

        <!-- Cuadro Horizontal: Patrones -->
        <a href="recursos/patrones.zip" download class="bento-item item-wide">
            <h3>PATRONES</h3>
            <p>Texturas de marca e identidad visual</p>
        </a>

    </main>

</body>
</html>
