<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assets | Caracas Bakery</title>
   <style>
    :root {
        --bg-color: #FFFFFF;
        --text-color: #000000;
        --accent: #f4f4f4;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        /* Centrado absoluto */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        width: 100%;
    }

    header {
        /* Espacio generoso para que el logo respire */
        padding: 60px 20px 20px 20px; 
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }

    .logo-bakery {
        max-height: 100px; /* Un poco más grande para que se aprecie el detalle */
        height: auto;
        width: auto;
    }

    /* Contenedor principal centrado */
    main {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-top: 100px;
        padding-bottom: 80px;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        gap: 20px;
        width: 90%;
        max-width: 1100px;
        margin: 0 auto; /* Centra el grid dentro de main */
    }

    .bento-item {
        background-color: var(--accent);
        border-radius: 24px;
        padding: 40px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        justify-content: center; /* Texto centrado verticalmente en la card */
        align-items: center;    /* Texto centrado horizontalmente en la card */
        text-align: center;
        transition: transform 0.3s ease;
    }

    .item-large { grid-column: span 2; grid-row: span 2; }
    .item-wide { grid-column: span 2; }

    /* Estilos Mobile Optimizado */
    @media (max-width: 768px) {
        header { 
            padding: 60px 20px 40px 20px; 
        }
        
        .bento-grid {
            grid-template-columns: 1fr; /* Una sola columna */
            grid-auto-rows: auto;
            width: 85%;
        }
        
        .item-large, .item-wide { 
            grid-column: span 1; 
            grid-row: span 1; 
        }
        
        .bento-item { 
            min-height: 200px; 
            padding: 30px;
        }
    }
</style>
</head>
<body>

    <header>
        <!-- Aquí puedes colocar un GIF animado o el SVG de Caracas Bakery -->
        <img src="recursos/logo-caracas-bakery.png" alt="Caracas Bakery" class="logo-bakery">

    <main class="bento-grid">
        
        <!-- Cuadro Grande: Logos -->
        <a href="recursos/logos.zip" download class="bento-item item-large">
            <h3>LOGOTIPOS</h3>
            <p>Descargar variantes (PNG, SVG, JPG)</p>
        </a>

        <!-- Cuadro: Menú -->
        <a href="recursos/menu.pdf" download class="bento-item">
            <h3>MENÚ</h3>
            <p>Cartas y Digital</p>
        </a>

        <!-- Cuadro: Stickers -->
        <a href="recursos/stickers.zip" download class="bento-item">
            <h3>STICKERS</h3>
            <p>Diseños para empaque</p>
        </a>

        <!-- Cuadro Horizontal: Patrones -->
        <a href="recursos/patrones.zip" download class="bento-item item-wide">
            <h3>PATRONES</h3>
            <p>Texturas de marca e identidad visual</p>
        </a>

    </main>

</body>
</html>
