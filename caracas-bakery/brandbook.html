<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandbook | Caracas Bakery</title>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --accent: #EDE2D5; /* Color crema seleccionado para el cintillo */
            --text-main: #000000;
            --text-secondary: #666666;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Contenedor del cintillo */
        .cintillo-seccion {
            width: 100%;
            background-color: var(--accent);
            padding: 100px 0; /* Espaciado vertical para elegancia */
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: relative; /* Necesario para posicionar el botón adentro */
        }

        /* Botón Volver posicionado arriba a la izquierda */
        .btn-volver {
            position: absolute;
            top: 25px;
            left: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: none; /* Respeta la mayúscula inicial manual */
            transition: color 0.3s ease;
        }

        .btn-volver:hover {
            color: var(--text-main);
        }

        /* Título del cintillo */
        .cintillo-seccion h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Área de contenido principal */
        .contenido-recursos {
            max-width: 1100px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
        }

        .contenido-recursos p {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .cintillo-seccion { padding: 80px 0; }
            .btn-volver { left: 20px; top: 20px; }
            .cintillo-seccion h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header class="cintillo-seccion">
        <!-- El botón "Volver al inicio" con la primera letra en mayúscula -->
        <a href="index.html" class="btn-volver">← Volver al inicio</a>
        <h1>Brandbook</h1> 
    </header>

    <main class="contenido-recursos">
        <p>Aquí irán los visualizadores y enlaces de descarga del Brandbook.</p>
        <!-- En esta sección podrás agregar imágenes o PDFs más adelante -->
    </main>

</body>
</html>
