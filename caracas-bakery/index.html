<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Assets | Caracas Bakery</title>
   <style>
    :root {
        --bg-color: #FFFFFF;
        --accent: #f4f4f4;
    }

    body {
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        display: block; /* Volvemos a bloque para estabilidad */
        width: 100%;
    }

    header {
        width: 100%;
        padding: 80px 0 60px 0; /* Espacio real arriba y abajo del logo */
        text-align: center;
    }

    .logo-bakery {
        max-height: 90px;
        width: auto;
    }

    /* El contenedor que centra TODO el grid */
    .grid-container {
        max-width: 1100px;
        margin: 0 auto; /* Centrado horizontal automático */
        padding: 0 20px 80px 20px;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        gap: 20px;
    }

    .bento-item {
        background-color: var(--accent);
        border-radius: 24px;
        padding: 30px;
        text-decoration: none;
        color: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
    }

    /* Clases de tamaño para el Bento */
    .item-large { grid-column: span 2; grid-row: span 2; }
    .item-wide { grid-column: span 2; }

    /* Ajustes para Mobile */
    @media (max-width: 768px) {
        header { padding: 60px 0 40px 0; }
        .bento-grid {
            grid-template-columns: 1fr; /* Una sola columna */
            grid-auto-rows: auto;
        }
        .item-large, .item-wide { 
            grid-column: span 1; 
            grid-row: span 1; 
        }
        .bento-item { min-height: 200px; }
    }
</style>
</head>
<body>

    <header>
    <img src="recursos/logo-caracas-bakery.png" class="logo-bakery">
</header>

<div class="grid-container"> <!-- Asegúrate de que esta línea exista -->
    <main class="bento-grid">
        <a href="#" class="bento-item item-large"> ... </a>
        <a href="#" class="bento-item"> ... </a>
        <a href="#" class="bento-item"> ... </a>
        <a href="#" class="bento-item item-wide"> ... </a>
    </main>
</div>

</body>
</html>
