<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandbook Interactivo | Caracas Bakery</title>
    
    <!-- Importamos librerías para el efecto revista y fuentes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FFFFFF;
            --accent: #EDE2D5;
            --text-main: #000000;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
        }

        .cintillo-seccion {
            background-color: var(--accent);
            padding: 60px 0;
            text-align: center;
        }

        /* Contenedor del Flipbook - Optimizado para Mobile */
        .flipbook-viewport {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            aspect-ratio: 4 / 3;
            background: #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* Simulación de visor interactivo */
        .flipbook-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background-image: url('recursos/portada-brandbook.jpg'); /* Imagen de portada */
            background-size: cover;
        }

        /* Formulario de WhatsApp Invisible */
        .whatsapp-form-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 20px;
            text-align: center;
        }

        .whatsapp-form-container textarea {
            width: 100%;
            height: 120px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            resize: none;
        }

        .btn-send-api {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <header class="cintillo-seccion">
        <h1>BRANDBOOK</h1>
    </header>

    <main>
        <!-- Visualizador Estilo Revista -->
        <div class="flipbook-viewport">
            <!-- Nota: Para un flipbook real de PDF se recomienda servicios como Issuu o AnyFlip embebidos -->
            <iframe src="https://heyzine.com/flip-book/tu-id-aqui" 
                    style="width:100%; height:100%; border:none;" 
                    allowfullscreen></iframe>
        </div>

        <!-- Formulario de Envío Silencioso -->
        <div class="whatsapp-form-container">
            <h3>Sugerencias Directas</h3>
            <p>Escribe tu mensaje y lo recibiremos al instante.</p>
            <textarea id="user-msg" placeholder="¿Qué piensas de nuestra nueva imagen?"></textarea>
            
            <button class="btn-send-api" onclick="handleFormSubmit()">
                <i class="fab fa-whatsapp"></i> ENVIAR AHORA
            </button>
            <div id="status" class="status-msg"></div>
        </div>
    </main>

    <script>
        async function handleFormSubmit() {
            const msg = document.getElementById('user-msg').value;
            const status = document.getElementById('status');
            
            if (!msg) return alert("Escribe un mensaje");

            status.style.display = "block";
            status.innerText = "Enviando...";
            status.style.color = "blue";

            // NOTA: Para enviar SIN abrir WhatsApp, debes conectar esto a un Backend 
            // o un servicio como Formspree o EmailJS que dispare el mensaje.
            // Aquí simulamos la petición exitosa:
            
            setTimeout(() => {
                status.innerText = "¡Mensaje enviado con éxito!";
                status.style.color = "green";
                document.getElementById('user-msg').value = "";
            }, 2000);
        }
    </script>
</body>
</html>
